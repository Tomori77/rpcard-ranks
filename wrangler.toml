name = "rpcard-ranks"
main = "src/index.js"
compatibility_date = "2024-10-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# D1 数据库(绑定名 d1)
[[d1_databases]]
binding = "d1"
database_name = "rank1"
database_id = "0903db6f-af56-40e6-a4d4-edd542fc7568"

# KV 缓存(绑定名 kv)
[[kv_namespaces]]
binding = "kv"
id = "5e3e004ddae9469fb616f4bcac9161e0"

# R2 图片存储(绑定名 r2)
[[r2_buckets]]
binding = "r2"
bucket_name = "rankr2"

# 所有者后台密码与会话密钥请在 Cloudflare Dashboard → Worker → Settings →
# Variables and Secrets 中配置 Secret 类型:
#   OWNER_PASSWORD   所有者应急登录密码
#   SESSION_SECRET   会话签名密钥(随机长字符串)