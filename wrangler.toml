name = "rpcard-ranks"
main = "src/index.js"
compatibility_date = "2024-10-01"
compatibility_flags = ["nodejs_compat"]
keep_vars = true

[observability]
enabled = true

#[[d1_databases]]
#binding = "DB"          #d1数据库绑定名默认不可修改
#database_name = ""     #d1数据库名字
#database_id = ""       #d1数据库id

#[[kv_namespaces]]
#binding = "CACHE"       #kv绑定名默认不可修改
#id = ""                #kv命名空间id

#[[r2_buckets]]
#binding = "IMAGES"      #r2对象存储绑定名默认不可修改
#bucket_name = ""        #r2对象存储桶的名字

# 所有 D1 / KV / R2 绑定与密钥(OWNER_PASSWORD、SESSION_SECRET)请在
# Cloudflare Dashboard → Worker → Settings → Bindings / Variables and Secrets
# 中配置,避免将资源 ID 与密钥提交至仓库。
# keep_vars = true 已启用,面板配置不会被 wrangler deploy 覆盖。